<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AssetFlow — Enterprise Asset & Resource Management System. Track, allocate, and maintain your organization's assets.">
  <title>AssetFlow | Enterprise Asset Management</title>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg">

  <!-- CSS Design System -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <!-- App Mount Point -->
  <div id="app">
    <!-- Loading State -->
    <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;">
      <img src="assets/logo.svg" alt="AssetFlow" width="64" height="64" class="pulse">
      <div style="font-size:1.25rem;font-weight:600;background:linear-gradient(135deg,#818cf8,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">AssetFlow</div>
      <div style="font-size:0.8125rem;color:#6b6b8d;">Loading...</div>
    </div>
  </div>

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>

  <!-- Core Modules (order matters: dependencies first) -->
  <script src="js/utils.js"></script>
  <script src="js/store.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/seed.js"></script>
  <script src="js/router.js"></script>

  <!-- Reusable Components -->
  <script src="js/components/sidebar.js"></script>
  <script src="js/components/topbar.js"></script>
  <script src="js/components/modal.js"></script>
  <script src="js/components/toast.js"></script>
  <script src="js/components/table.js"></script>
  <script src="js/components/calendar.js"></script>
  <script src="js/components/charts.js"></script>
  <script src="js/components/form.js"></script>

  <!-- Page Modules -->
  <script src="js/pages/login.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/org-setup.js"></script>
  <script src="js/pages/assets.js"></script>
  <script src="js/pages/allocation.js"></script>
  <script src="js/pages/booking.js"></script>
  <script src="js/pages/maintenance.js"></script>
  <script src="js/pages/audit.js"></script>
  <script src="js/pages/reports.js"></script>
  <script src="js/pages/activity.js"></script>

  <!-- App Bootstrap (must be last) -->
  <script src="js/app.js"></script>
</body>
</html>
